name: "Default Checks"

permissions:
  contents: read # for actions/checkout to fetch code
  checks: write # for merge gatekeeper to create checks
  statuses: write # for merge gatekeeper to create statuses

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]
    branches:
      - main

jobs:
  check:
    uses: stuhlmuller/workflows/.github/workflows/default.yml@369a3fd5ed99d25eda6fc3eb7aa7830823b8817c # main
    with:
      checkov: false
      merge-checks-timeout: 300
