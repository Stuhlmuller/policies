name: "Default Checks"

permissions:
  contents: read # for actions/checkout to fetch code
  checks: write # for merge gatekeeper to create checks
  statuses: write # for merge gatekeeper to create statuses

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]
    branches:
      - main

jobs:
  check:
    uses: stuhlmuller/workflows/.github/workflows/default.yml@43e92f32a7b6175ed6e5ee05a66c432745989ded # main
    with:
      checkov: false
      merge-checks-timeout: 300
